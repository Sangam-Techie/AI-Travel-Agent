services:
  - type: web
    name: travel-agent-api
    env: python
    # Installs uv, loads it into the path, and syncs dependencies exactly from uv.lock
    buildCommand: curl -LsSf https://astral.sh/uv/install.sh | sh && source $HOME/.local/bin/env && uv sync --frozen
    # Prefixed with 'uv run' to execute within the uv environment
    startCommand: uv run uvicorn src.api.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: AMADEUS_API_KEY
        sync: false
      - key: AMADEUS_API_SECRET
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
