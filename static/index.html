<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Travel Agent</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%E2%9C%88%EF%B8%8F</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0B1E33;
    --panel: #10263F;
    --panel-2: #15304F;
    --paper: #E7ECF3;
    --accent: #FFB020;
    --accent-2: #38B6FF;
    --line: #24486B;
    --text: #EAF0F6;
    --text-muted: #93A9C2;
    --danger: #FF6B6B;
    --success: #35D08A;
    --radius: 10px;
    --mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    background: var(--ink);
    color: var(--text);
    font-family: var(--sans);
  }

  body {
    display: flex;
    justify-content: center;
    background-image:
      linear-gradient(var(--ink), var(--ink)),
      repeating-linear-gradient(180deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 3px);
  }

  a { color: var(--accent-2); }

  button { font-family: inherit; cursor: pointer; }
  button:focus-visible, input:focus-visible, .chip:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .app {
    width: 100%;
    max-width: 760px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--line);
    border-right: 1px solid var(--line);
    background: linear-gradient(180deg, var(--panel-2), var(--ink) 220px);
  }

  /* ---------- header: departures board ---------- */
  .board {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--line);
  }

  .board__top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .brand { display: flex; flex-direction: column; gap: 4px; }

  .brand__title {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.04em;
    margin: 0;
  }

  .brand__eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .board__meta {
    text-align: right;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
  }

  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-muted);
  }
  .status-dot--ok { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .status-dot--err { background: var(--danger); box-shadow: 0 0 6px var(--danger); }

  .board__actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 7px 12px;
    border-radius: 999px;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-ghost:hover { border-color: var(--accent-2); color: var(--text); }

  /* ---------- example chips ---------- */
  .chips {
    display: flex;
    gap: 8px;
    padding: 14px 20px;
    overflow-x: auto;
    border-bottom: 1px solid var(--line);
  }
  .chip {
    flex: 0 0 auto;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--text);
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 999px;
    white-space: nowrap;
    transition: border-color 0.15s, transform 0.1s;
  }
  .chip:hover { border-color: var(--accent); }
  .chip:active { transform: scale(0.98); }

  /* ---------- chat ---------- */
  .chat {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
  }

  .msg { max-width: 88%; }
  .msg--user { align-self: flex-end; }
  .msg--agent, .msg--error { align-self: flex-start; }

  .msg__meta {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .bubble--user {
    background: var(--paper);
    color: var(--ink);
    padding: 10px 14px;
    border-radius: var(--radius) var(--radius) 2px var(--radius);
    font-size: 14.5px;
    line-height: 1.5;
  }

  /* the "ticket stub" card, signature element */
  .bubble--agent {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--line);
    border-left: 3px dashed var(--accent);
    border-radius: 2px var(--radius) var(--radius) 2px;
    padding: 14px 16px 14px 20px;
    font-size: 14.5px;
    line-height: 1.55;
  }
  .bubble--agent::before, .bubble--agent::after {
    content: "";
    position: absolute;
    left: -9px;
    width: 16px; height: 16px;
    background: var(--ink);
    border-radius: 50%;
    border: 1px solid var(--line);
  }
  .bubble--agent::before { top: -8px; }
  .bubble--agent::after { bottom: -8px; }

  .bubble--error {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--line);
    border-left: 3px dashed var(--danger);
    border-radius: 2px var(--radius) var(--radius) 2px;
    padding: 14px 16px 14px 20px;
    font-size: 14px;
    color: var(--text);
  }
  .bubble--error::before, .bubble--error::after {
    content: "";
    position: absolute;
    left: -9px;
    width: 16px; height: 16px;
    background: var(--ink);
    border-radius: 50%;
    border: 1px solid var(--line);
  }
  .bubble--error::before { top: -8px; }
  .bubble--error::after { bottom: -8px; }

  .bubble p { margin: 0 0 8px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble ul { margin: 0 0 8px; padding-left: 20px; }
  .bubble li { margin-bottom: 4px; }
  .bubble strong { color: var(--accent); }

  .retry-btn {
    margin-top: 8px;
    background: transparent;
    border: 1px solid var(--danger);
    color: var(--danger);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 6px;
  }
  .retry-btn:hover { background: var(--danger); color: var(--ink); }

  .typing { display: inline-flex; gap: 4px; align-items: center; }
  .typing span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent);
    animation: blink 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

  /* ---------- composer ---------- */
  .composer {
    display: flex;
    gap: 8px;
    padding: 16px 20px;
    border-top: 1px solid var(--line);
    background: var(--ink);
  }
  .composer input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14.5px;
    font-family: var(--sans);
  }
  .composer input::placeholder { color: var(--text-muted); }
  .composer button {
    background: var(--accent);
    color: var(--ink);
    border: none;
    font-family: var(--mono);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.06em;
    padding: 0 18px;
    border-radius: 8px;
    transition: opacity 0.15s;
  }
  .composer button:disabled { opacity: 0.5; cursor: not-allowed; }

  .footer-bar {
    display: flex;
    justify-content: space-between;
    padding: 8px 20px 16px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  /* ---------- trace drawer ---------- */
  .trace-drawer {
    position: fixed;
    top: 0; right: -360px;
    width: 340px; max-width: 90vw;
    height: 100dvh;
    background: var(--panel);
    border-left: 1px solid var(--line);
    transition: right 0.2s ease;
    z-index: 20;
    display: flex;
    flex-direction: column;
  }
  .trace-drawer.open { right: 0; }
  .trace-drawer__head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .trace-drawer__body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .trace-entry {
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--ink);
  }
  .trace-entry summary {
    padding: 8px 10px;
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }
  .trace-entry summary .sub { color: var(--text-muted); font-weight: 400; }
  .trace-entry pre {
    margin: 0;
    padding: 10px;
    font-size: 11px;
    color: var(--text-muted);
    white-space: pre-wrap;
    word-break: break-word;
    border-top: 1px solid var(--line);
  }
  .trace-empty { color: var(--text-muted); font-size: 13px; padding: 12px 0; }
  .icon-btn {
    background: transparent; border: none; color: var(--text-muted); font-size: 16px;
  }
  .icon-btn:hover { color: var(--text); }

  @media (max-width: 520px) {
    .board__meta { text-align: left; }
    .msg { max-width: 100%; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

  <div class="app">
    <div class="board">
      <div class="board__top">
        <div class="brand">
          <p class="brand__eyebrow">Real-time flight + weather assistant</p>
          <h1 class="brand__title">&#9992; AI Travel Agent</h1>
        </div>
        <div class="board__meta">
          <div id="clock">&mdash;</div>
          <div class="status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusLabel">CONNECTING</span>
          </div>
        </div>
      </div>
      <div class="board__actions">
        <button class="btn-ghost" id="newConvoBtn" type="button">New conversation</button>
        <button class="btn-ghost" id="traceToggleBtn" type="button">Trace log</button>
      </div>
    </div>

    <div class="chips" id="chips">
      <button class="chip" type="button" data-q="Find flights from JFK to CDG next Friday, economy, nonstop only">JFK &rarr; CDG, nonstop</button>
      <button class="chip" type="button" data-q="What's the weather like in Tokyo this weekend?">Tokyo weather, this weekend</button>
      <button class="chip" type="button" data-q="I need a round trip from London to New York in two weeks, business class, 2 adults">London &#8644; NYC, business</button>
    </div>

    <main class="chat" id="chat" aria-live="polite"></main>

    <form class="composer" id="composer">
      <input id="input" type="text" placeholder="Ask about a route, a date, or the weather where you're headed&hellip;" autocomplete="off">
      <button type="submit">Send &#9656;</button>
    </form>

    <div class="footer-bar">
      <span id="sessionLabel">SESSION &mdash;</span>
      <span>Amadeus + OpenWeatherMap live data</span>
    </div>
  </div>

  <aside class="trace-drawer" id="traceDrawer">
    <div class="trace-drawer__head">
      <span>Agent trace log</span>
      <button class="icon-btn" id="traceCloseBtn" type="button" aria-label="Close trace log">&#10005;</button>
    </div>
    <div class="trace-drawer__body" id="traceBody">
      <p class="trace-empty">Send a message, then open this panel to see each step the agent took.</p>
    </div>
  </aside>

<script>
(function () {
  "use strict";

  var API_BASE = location.origin;
  function apiUrl(path) { return API_BASE + path; }

  function uuid() {
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function (c) {
      var r = Math.random() * 16 | 0, v = c === "x" ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  }

  var STORAGE_KEY = "ata_session_v1";
  var state = loadState();

  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        if (parsed && parsed.sessionId) return parsed;
      }
    } catch (e) { /* ignore corrupt storage */ }
    return { sessionId: uuid(), messages: [] };
  }

  function persist() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { /* storage full/disabled */ }
  }

  var chatEl = document.getElementById("chat");
  var inputEl = document.getElementById("input");
  var formEl = document.getElementById("composer");
  var sendBtn = formEl.querySelector("button[type=submit]");
  var sessionLabel = document.getElementById("sessionLabel");
  var traceDrawer = document.getElementById("traceDrawer");
  var traceBody = document.getElementById("traceBody");
  var traceDrawerOpen = false;
  var sending = false;

  function esc(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function boldify(s) {
    return s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  }

  function renderContent(text) {
    var lines = String(text || "").split("\n");
    var html = "";
    var inList = false;
    for (var i = 0; i < lines.length; i++) {
      var raw = lines[i];
      var bulletMatch = /^\s*[-*]\s+(.*)$/.exec(raw);
      if (bulletMatch) {
        if (!inList) { html += "<ul>"; inList = true; }
        html += "<li>" + boldify(esc(bulletMatch[1])) + "</li>";
      } else {
        if (inList) { html += "</ul>"; inList = false; }
        var trimmed = raw.trim();
        if (trimmed === "") continue;
        html += "<p>" + boldify(esc(raw)) + "</p>";
      }
    }
    if (inList) html += "</ul>";
    return html || "<p></p>";
  }

  function timeLabel(ts) {
    try { return new Date(ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }); }
    catch (e) { return ""; }
  }

  function appendMessage(role, content, ts) {
    var wrap = document.createElement("div");
    wrap.className = "msg msg--" + role;

    var meta = document.createElement("div");
    meta.className = "msg__meta";
    meta.textContent = (role === "user" ? "You" : "Agent") + " \u00b7 " + timeLabel(ts || Date.now());
    wrap.appendChild(meta);

    var bubble = document.createElement("div");
    if (role === "user") {
      bubble.className = "bubble--user";
      bubble.textContent = content;
    } else {
      bubble.className = "bubble bubble--agent";
      bubble.innerHTML = renderContent(content);
    }
    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
    return wrap;
  }

  function appendLoading() {
    var wrap = document.createElement("div");
    wrap.className = "msg msg--agent";
    var meta = document.createElement("div");
    meta.className = "msg__meta";
    meta.textContent = "Agent \u00b7 working";
    wrap.appendChild(meta);

    var bubble = document.createElement("div");
    bubble.className = "bubble bubble--agent";
    var phrases = ["Checking availability\u2026", "Cross-referencing routes\u2026", "Pulling live prices\u2026", "Almost there\u2026"];
    var span = document.createElement("span");
    span.className = "typing";
    span.innerHTML = "<span></span><span></span><span></span>";
    var label = document.createElement("span");
    label.style.marginLeft = "8px";
    label.textContent = phrases[0];
    bubble.appendChild(span);
    bubble.appendChild(label);
    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;

    var idx = 0;
    var interval = setInterval(function () {
      idx = (idx + 1) % phrases.length;
      label.textContent = phrases[idx];
    }, 2200);
    wrap._stop = function () { clearInterval(interval); };
    return wrap;
  }

  function appendError(message, onRetry) {
    var wrap = document.createElement("div");
    wrap.className = "msg msg--error";
    var meta = document.createElement("div");
    meta.className = "msg__meta";
    meta.textContent = "Agent \u00b7 couldn't complete that";
    wrap.appendChild(meta);

    var bubble = document.createElement("div");
    bubble.className = "bubble--error";
    var p = document.createElement("p");
    p.style.margin = "0 0 4px";
    p.textContent = message;
    bubble.appendChild(p);

    if (onRetry) {
      var btn = document.createElement("button");
      btn.className = "retry-btn";
      btn.type = "button";
      btn.textContent = "Try again";
      btn.addEventListener("click", function () {
        wrap.remove();
        onRetry();
      });
      bubble.appendChild(btn);
    }

    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
    return wrap;
  }

  function renderWelcome() {
    chatEl.innerHTML = "";
    appendMessage(
      "agent",
      "**Welcome aboard.** Tell me where you're headed and when \u2014 I can search live flights " +
      "(with prices, stops, and layovers) and check current or forecasted weather at your destination.\n\n" +
      "- Give me a route, a date, and any preferences (class, nonstop, budget)\n" +
      "- Ask about weather for a specific day of your trip, not just today\n" +
      "- I'll flag the cheapest and fastest options when there's more than one",
      Date.now()
    );
  }

  function renderHistory() {
    chatEl.innerHTML = "";
    if (!state.messages.length) { renderWelcome(); return; }
    state.messages.forEach(function (m) { appendMessage(m.role, m.content, m.time); });
  }

  function setComposerEnabled(enabled) {
    inputEl.disabled = !enabled;
    sendBtn.disabled = !enabled;
  }

  async function safeErrorDetail(res) {
    try {
      var data = await res.json();
      return data && data.detail;
    } catch (e) { return null; }
  }

  async function sendMessage(text) {
    if (!text || !text.trim() || sending) return;
    sending = true;
    setComposerEnabled(false);

    appendMessage("user", text, Date.now());
    state.messages.push({ role: "user", content: text, time: Date.now() });
    persist();

    var loadingEl = appendLoading();

    try {
      var res = await fetch(apiUrl("/chat"), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, session_id: state.sessionId }),
      });

      if (!res.ok) {
        var detail = await safeErrorDetail(res);
        throw new Error(detail || ("The agent returned an error (HTTP " + res.status + ")."));
      }

      var data = await res.json();
      state.sessionId = data.session_id;
      updateSessionLabel();

      loadingEl._stop();
      loadingEl.remove();
      appendMessage("agent", data.response, Date.now());
      state.messages.push({ role: "agent", content: data.response, time: Date.now() });
      persist();

      if (traceDrawerOpen) refreshTraces();
    } catch (err) {
      loadingEl._stop();
      loadingEl.remove();
      var msg = (err && err.message) || "Couldn't reach the agent. Check your connection and try again.";
      appendError(msg, function () { sendMessage(text); });
    } finally {
      sending = false;
      setComposerEnabled(true);
      inputEl.focus();
    }
  }

  formEl.addEventListener("submit", function (e) {
    e.preventDefault();
    var text = inputEl.value;
    inputEl.value = "";
    sendMessage(text);
  });

  document.getElementById("chips").addEventListener("click", function (e) {
    var chip = e.target.closest(".chip");
    if (!chip) return;
    var q = chip.getAttribute("data-q");
    if (q) sendMessage(q);
  });

  document.getElementById("newConvoBtn").addEventListener("click", async function () {
    var oldId = state.sessionId;
    try { await fetch(apiUrl("/session/" + oldId), { method: "DELETE" }); } catch (e) { /* best effort */ }
    state = { sessionId: uuid(), messages: [] };
    persist();
    updateSessionLabel();
    renderWelcome();
    traceBody.innerHTML = '<p class="trace-empty">Send a message, then open this panel to see each step the agent took.</p>';
  });

  function updateSessionLabel() {
    sessionLabel.textContent = "SESSION " + state.sessionId.slice(0, 8);
  }

  // ---------- trace drawer ----------
  function formatTraceEntry(entry) {
    if (entry.event === "tool_start") return { label: "\u2192 " + entry.tool, sub: "called" };
    if (entry.event === "tool_result") return { label: "\u2713 " + entry.tool, sub: "returned" };
    if (entry.event === "tool_error") return { label: "\u2715 " + entry.tool, sub: entry.error || "error" };
    if (entry.event === "llm_error") return { label: "\u2715 model", sub: entry.error || "error" };
    if (entry.tool_calls) return { label: "iteration " + entry.iteration, sub: "requested " + entry.tool_calls.length + " tool call(s)" };
    return { label: "iteration " + (entry.iteration != null ? entry.iteration : ""), sub: "responded" };
  }

  function renderTraces(traces) {
    traceBody.innerHTML = "";
    if (!traces || !traces.length) {
      traceBody.innerHTML = '<p class="trace-empty">No steps recorded for this session yet.</p>';
      return;
    }
    traces.forEach(function (entry) {
      var meta = formatTraceEntry(entry);
      var details = document.createElement("details");
      details.className = "trace-entry";
      var summary = document.createElement("summary");
      var labelSpan = document.createElement("span");
      labelSpan.textContent = meta.label;
      var subSpan = document.createElement("span");
      subSpan.className = "sub";
      subSpan.textContent = meta.sub;
      summary.appendChild(labelSpan);
      summary.appendChild(subSpan);
      details.appendChild(summary);
      var pre = document.createElement("pre");
      pre.textContent = JSON.stringify(entry, null, 2);
      details.appendChild(pre);
      traceBody.appendChild(details);
    });
  }

  async function refreshTraces() {
    try {
      var res = await fetch(apiUrl("/traces/" + state.sessionId));
      if (!res.ok) { renderTraces([]); return; }
      var data = await res.json();
      renderTraces(data.traces);
    } catch (e) {
      traceBody.innerHTML = '<p class="trace-empty">Couldn\'t load the trace log.</p>';
    }
  }

  document.getElementById("traceToggleBtn").addEventListener("click", function () {
    traceDrawerOpen = !traceDrawerOpen;
    traceDrawer.classList.toggle("open", traceDrawerOpen);
    if (traceDrawerOpen) refreshTraces();
  });
  document.getElementById("traceCloseBtn").addEventListener("click", function () {
    traceDrawerOpen = false;
    traceDrawer.classList.remove("open");
  });

  // ---------- header clock + status ----------
  function tickClock() {
    var el = document.getElementById("clock");
    var now = new Date();
    var dateStr = now.toLocaleDateString("en-GB", { weekday: "short", day: "2-digit", month: "short", year: "numeric" }).toUpperCase();
    var timeStr = now.toLocaleTimeString("en-GB", { hour12: false });
    el.textContent = dateStr + " \u00b7 " + timeStr;
  }
  tickClock();
  setInterval(tickClock, 1000);

  async function pingHealth() {
    var dot = document.getElementById("statusDot");
    var label = document.getElementById("statusLabel");
    try {
      var res = await fetch(apiUrl("/health"));
      if (!res.ok) throw new Error("bad status");
      dot.className = "status-dot status-dot--ok";
      label.textContent = "ONLINE";
    } catch (e) {
      dot.className = "status-dot status-dot--err";
      label.textContent = "OFFLINE";
    }
  }
  pingHealth();
  setInterval(pingHealth, 60000);

  // ---------- init ----------
  updateSessionLabel();
  renderHistory();
})();
</script>
</body>
</html>
